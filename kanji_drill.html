<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>漢字ドリル</title>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --primary: #2d6a4f;
    --primary-light: #52b788;
    --primary-pale: #d8f3dc;
    --accent: #e76f51;
    --accent-pale: #fde8e2;
    --text: #1b1b1b;
    --text-mid: #555;
    --text-light: #999;
    --border: #e0ddd6;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ===== HEADER ===== */
  .header {
    background: var(--primary);
    color: white;
    padding: 20px 20px 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  /* ===== HOME SCREEN ===== */
  .home-body { padding: 20px; flex: 1; overflow-y: auto; }

  .section-label {
    font-size: 11px; font-weight: 700; color: var(--text-light);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin: 24px 0 10px;
  }
  .section-label:first-child { margin-top: 0; }

  /* Unit list */
  .unit-list { display: flex; flex-direction: column; gap: 8px; }
  .unit-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .unit-card.selected { border-color: var(--primary); background: var(--primary-pale); }
  .unit-card-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .unit-card.selected .unit-card-check {
    background: var(--primary); border-color: var(--primary);
  }
  .unit-card-check::after {
    content: '✓'; color: white; font-size: 13px; font-weight: 700;
    display: none;
  }
  .unit-card.selected .unit-card-check::after { display: block; }
  .unit-card-info { flex: 1; }
  .unit-card-name { font-size: 15px; font-weight: 600; }
  .unit-card-count { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .unit-card-progress {
    height: 4px; background: var(--border); border-radius: 2px;
    margin-top: 6px; overflow: hidden;
  }
  .unit-card-progress-bar {
    height: 100%; background: var(--primary-light); border-radius: 2px;
    transition: width 0.3s;
  }
  .unit-card-badge {
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
    background: var(--primary-pale); color: var(--primary);
    flex-shrink: 0;
  }

  /* Select all */
  .select-all-row {
    display: flex; justify-content: flex-end; margin-bottom: 10px;
  }
  .btn-link {
    font-size: 13px; color: var(--primary); font-weight: 600;
    background: none; border: none; cursor: pointer; padding: 4px 0;
  }

  /* Mode selector */
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mode-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 16px 14px;
    cursor: pointer;
    border: 2px solid var(--border);
    transition: all 0.15s;
    text-align: center;
  }
  .mode-card:active { transform: scale(0.97); }
  .mode-card-icon { font-size: 24px; margin-bottom: 6px; }
  .mode-card-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .mode-card-desc { font-size: 11px; color: var(--text-light); margin-top: 2px; }
  .mode-card.disabled { opacity: 0.4; cursor: not-allowed; }

  /* Start button */
  .start-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
    margin-top: 28px;
    letter-spacing: 0.05em;
    transition: background 0.15s, transform 0.1s;
  }
  .start-btn:active { transform: scale(0.98); }
  .start-btn:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; }

  /* ===== QUIZ SCREEN ===== */
  .quiz-header {
    background: var(--primary);
    color: white;
    padding: 14px 20px 12px;
  }
  .quiz-header-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .quiz-back { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 0; }
  .quiz-counter { font-size: 13px; opacity: 0.85; }
  .quiz-progress {
    height: 5px; background: rgba(255,255,255,0.3);
    border-radius: 3px; overflow: hidden;
  }
  .quiz-progress-bar {
    height: 100%; background: white; border-radius: 3px;
    transition: width 0.4s ease;
  }

  .quiz-body { flex: 1; padding: 24px 20px; display: flex; flex-direction: column; overflow-y: auto; }

  .quiz-unit-label {
    font-size: 11px; font-weight: 700; color: var(--text-light);
    letter-spacing: 0.08em; margin-bottom: 14px;
  }

  .quiz-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
  }
  .quiz-question {
    font-size: 22px; font-weight: 600; line-height: 1.7;
    text-align: center; letter-spacing: 0.05em;
  }
  .quiz-blank {
    display: inline-block;
    border-bottom: 3px solid var(--primary);
    min-width: 2em; text-align: center;
    color: transparent;
    background: var(--primary-pale);
    border-radius: 4px;
    padding: 0 4px;
  }
  .quiz-hint {
    font-size: 13px; color: var(--text-light);
    text-align: center; margin-top: 16px;
    line-height: 1.5;
  }

  /* Answer reveal */
  .answer-area {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    text-align: center;
    display: none;
  }
  .answer-area.visible { display: block; }
  .answer-label { font-size: 12px; color: var(--text-light); font-weight: 600; letter-spacing: 0.08em; margin-bottom: 10px; }
  .answer-text { font-size: 36px; font-weight: 700; color: var(--primary); letter-spacing: 0.1em; }
  .answer-reading { font-size: 14px; color: var(--text-mid); margin-top: 6px; }

  /* Buttons */
  .show-btn {
    background: var(--primary);
    color: white; border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-size: 16px; font-weight: 700;
    width: 100%; cursor: pointer;
    margin-top: 16px;
    transition: background 0.15s, transform 0.1s;
  }
  .show-btn:active { transform: scale(0.98); }

  .judge-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-top: 16px;
    display: none;
  }
  .judge-row.visible { display: grid; }

  .btn-ok {
    background: var(--primary);
    color: white; border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn-ok:active { transform: scale(0.97); }

  .btn-ng {
    background: var(--accent-pale);
    color: var(--accent); border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn-ng:active { transform: scale(0.97); }

  /* Streak dots */
  .streak-dots {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 16px;
  }
  .streak-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .streak-dot.filled { background: var(--primary-light); }

  /* ===== RESULT SCREEN ===== */
  .result-body {
    flex: 1; padding: 32px 24px;
    display: flex; flex-direction: column; align-items: center;
    overflow-y: auto;
  }
  .result-icon { font-size: 64px; margin-bottom: 16px; }
  .result-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .result-subtitle { font-size: 14px; color: var(--text-mid); margin-bottom: 32px; text-align: center; }
  .result-stats {
    width: 100%; display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 18px 16px; text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num { font-size: 32px; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  .result-missed {
    width: 100%; margin-bottom: 28px;
  }
  .result-missed-title {
    font-size: 13px; font-weight: 700; color: var(--text-mid);
    margin-bottom: 10px; letter-spacing: 0.05em;
  }
  .missed-item {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .missed-q { font-size: 13px; color: var(--text-mid); flex: 1; }
  .missed-a { font-size: 16px; font-weight: 700; color: var(--accent); }

  .result-btns { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .btn-primary {
    background: var(--primary); color: white; border: none;
    border-radius: var(--radius); padding: 18px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    background: var(--surface); color: var(--primary);
    border: 2px solid var(--primary);
    border-radius: var(--radius); padding: 16px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s;
  }
  .btn-secondary:active { transform: scale(0.98); }

  /* ===== MASTER BADGE ===== */
  .master-badge {
    display: inline-block;
    background: linear-gradient(135deg, #f6c90e, #e8a000);
    color: white; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    letter-spacing: 0.05em;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: #1b1b1b; color: white;
    padding: 12px 24px; border-radius: 40px;
    font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s;
    z-index: 100; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ========== HOME SCREEN ========== -->
<div class="screen active" id="screen-home">

    <p>中学１年　書き練習</p>
  </div>
  <div class="home-body">

    <div class="section-label">単元を選ぶ</div>
    <div class="select-all-row">
      <button class="btn-link" onclick="toggleAll()">すべて選択／解除</button>
    </div>
    <div class="unit-list" id="unit-list"></div>

    <div class="section-label">出題モード</div>
    <div class="mode-grid">
      <div class="mode-card" id="mode-all" onclick="selectMode('all')">
        <div class="mode-card-icon">📚</div>
        <div class="mode-card-name">全問</div>
        <div class="mode-card-desc">選択した全問題</div>
      </div>
      <div class="mode-card" id="mode-random10" onclick="selectMode('random10')">
        <div class="mode-card-icon">🎲</div>
        <div class="mode-card-name">10問ランダム</div>
        <div class="mode-card-desc">ランダムに10問</div>
      </div>
      <div class="mode-card" id="mode-weak5" onclick="selectMode('weak5')">
        <div class="mode-card-icon">💪</div>
        <div class="mode-card-name">苦手5問</div>
        <div class="mode-card-desc">正答率が低い順</div>
      </div>
      <div class="mode-card" id="mode-srs" onclick="selectMode('srs')">
        <div class="mode-card-icon">🔄</div>
        <div class="mode-card-name">今日の復習</div>
        <div class="mode-card-desc">SRS復習問題</div>
      </div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>単元を選んでください</button>
  </div>
</div>

<!-- ========== QUIZ SCREEN ========== -->
<div class="screen" id="screen-quiz">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <button class="quiz-back" onclick="goHome()">←</button>
      <div class="quiz-counter" id="quiz-counter">1 / 10</div>
      <div style="width:32px"></div>
    </div>
    <div class="quiz-progress">
      <div class="quiz-progress-bar" id="quiz-progress-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="quiz-body">
    <div class="quiz-unit-label" id="quiz-unit-label"></div>

    <div class="quiz-card">
      <div class="quiz-question" id="quiz-question"></div>
      <div class="quiz-hint" id="quiz-hint"></div>
    </div>

    <div class="streak-dots" id="streak-dots">
      <div class="streak-dot" id="dot0"></div>
      <div class="streak-dot" id="dot1"></div>
      <div class="streak-dot" id="dot2"></div>
    </div>

    <div class="answer-area" id="answer-area">
      <div class="answer-label">こたえ</div>
      <div class="answer-text" id="answer-text"></div>
    </div>

    <button class="show-btn" id="show-btn" onclick="showAnswer()">答えを見る</button>

    <div class="judge-row" id="judge-row">
      <button class="btn-ng" onclick="judge(false)">😓 もう一回</button>
      <button class="btn-ok" onclick="judge(true)">✓ できた！</button>
    </div>
  </div>
</div>

<!-- ========== RESULT SCREEN ========== -->
<div class="screen" id="screen-result">
  <div class="header">
    <h1>結果</h1>
  </div>
  <div class="result-body">
    <div class="result-icon" id="result-icon">🎉</div>
    <div class="result-title" id="result-title">お疲れ様！</div>
    <div class="result-subtitle" id="result-subtitle"></div>
    <div class="result-stats">
      <div class="stat-card">
        <div class="stat-num" id="stat-correct">0</div>
        <div class="stat-label">正解</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">出題数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-rate">0%</div>
        <div class="stat-label">正答率</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-master">0</div>
        <div class="stat-label">マスター</div>
      </div>
    </div>
    <div class="result-missed" id="result-missed"></div>
    <div class="result-btns">
      <button class="btn-primary" onclick="retryMissed()" id="btn-retry-missed">間違えた問題を復習</button>
      <button class="btn-secondary" onclick="goHome()">単元選択に戻る</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ==================== STATE ====================
const STORAGE_KEY = 'kanji_drill_v1';
let state = {
  progress: {}, // { "unitId_qIndex": { correct: N, streak: N, nextReview: timestamp } }
};

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function getKey(unitId, qIdx) { return `${unitId}_${qIdx}`; }
function getProgress(unitId, qIdx) {
  return state.progress[getKey(unitId, qIdx)] || { correct: 0, wrong: 0, streak: 0, nextReview: 0 };
}
function updateProgress(unitId, qIdx, isCorrect) {
  const key = getKey(unitId, qIdx);
  const p = getProgress(unitId, qIdx);
  if (isCorrect) {
    p.correct = (p.correct || 0) + 1;
    p.streak = (p.streak || 0) + 1;
    // SRS intervals: 1,3,7,14,30 days
    const intervals = [1, 3, 7, 14, 30];
    const idx = Math.min(p.streak - 1, intervals.length - 1);
    p.nextReview = Date.now() + intervals[idx] * 86400000;
  } else {
    p.wrong = (p.wrong || 0) + 1;
    p.streak = 0;
    p.nextReview = Date.now() + 86400000; // 1 day
  }
  state.progress[key] = p;
  saveState();
}
function isMastered(unitId, qIdx) { return getProgress(unitId, qIdx).streak >= 3; }
function isDueForReview(unitId, qIdx) {
  const p = getProgress(unitId, qIdx);
  return p.nextReview > 0 && p.nextReview <= Date.now();
}
function getAccuracy(unitId, qIdx) {
  const p = getProgress(unitId, qIdx);
  const total = (p.correct || 0) + (p.wrong || 0);
  return total === 0 ? 100 : Math.round((p.correct / total) * 100);
}

// ==================== HOME ====================
let selectedUnits = new Set();
let selectedMode = 'all';

function renderHome() {
  const list = document.getElementById('unit-list');
  list.innerHTML = '';
  UNITS.forEach(unit => {
    const masteredCount = unit.questions.filter((_, i) => isMastered(unit.id, i)).length;
    const pct = Math.round((masteredCount / unit.questions.length) * 100);
    const isSelected = selectedUnits.has(unit.id);
    const card = document.createElement('div');
    card.className = 'unit-card' + (isSelected ? ' selected' : '');
    card.onclick = () => toggleUnit(unit.id);
    card.innerHTML = `
      <div class="unit-card-check"></div>
      <div class="unit-card-info">
        <div class="unit-card-name">${unit.title}</div>
        <div class="unit-card-count">${unit.questions.length}問　マスター ${masteredCount}問</div>
        <div class="unit-card-progress">
          <div class="unit-card-progress-bar" style="width:${pct}%"></div>
        </div>
      </div>
      ${masteredCount === unit.questions.length ? '<span class="master-badge">MASTER</span>' : `<span class="unit-card-badge">${pct}%</span>`}
    `;
    list.appendChild(card);
  });
  updateStartBtn();
  updateModeCards();
}

function toggleUnit(id) {
  if (selectedUnits.has(id)) selectedUnits.delete(id);
  else selectedUnits.add(id);
  renderHome();
}

function toggleAll() {
  if (selectedUnits.size === UNITS.length) selectedUnits.clear();
  else UNITS.forEach(u => selectedUnits.add(u.id));
  renderHome();
}

function selectMode(mode) {
  selectedMode = mode;
  updateModeCards();
  updateStartBtn();
}

function updateModeCards() {
  ['all','random10','weak5','srs'].forEach(m => {
    const el = document.getElementById('mode-' + m);
    el.style.borderColor = m === selectedMode ? 'var(--primary)' : 'var(--border)';
    el.style.background = m === selectedMode ? 'var(--primary-pale)' : '';
  });
}

function updateStartBtn() {
  const btn = document.getElementById('start-btn');
  if (selectedUnits.size === 0) {
    btn.disabled = true;
    btn.textContent = '単元を選んでください';
    return;
  }
  btn.disabled = false;
  const modeNames = { all: '全問', random10: '10問ランダム', weak5: '苦手5問', srs: '今日の復習' };
  btn.textContent = `▶ ${modeNames[selectedMode]}で始める`;
}

// ==================== QUIZ ====================
let quizQuestions = [];
let quizIndex = 0;
let quizResults = [];
let answerShown = false;

function buildQuestions() {
  let pool = [];
  selectedUnits.forEach(uid => {
    const unit = UNITS.find(u => u.id === uid);
    if (!unit) return;
    unit.questions.forEach((q, i) => {
      pool.push({ unitId: uid, unitTitle: unit.title, qIdx: i, ...q });
    });
  });

  if (selectedMode === 'all') return pool;
  if (selectedMode === 'random10') {
    return shuffle(pool).slice(0, Math.min(10, pool.length));
  }
  if (selectedMode === 'weak5') {
    return pool
      .filter(q => (getProgress(q.unitId, q.qIdx).correct + getProgress(q.unitId, q.qIdx).wrong) > 0)
      .sort((a, b) => getAccuracy(a.unitId, a.qIdx) - getAccuracy(b.unitId, b.qIdx))
      .slice(0, 5)
      .concat(pool.filter(q => (getProgress(q.unitId, q.qIdx).correct + getProgress(q.unitId, q.qIdx).wrong) === 0).slice(0, Math.max(0, 5 - pool.filter(q => (getProgress(q.unitId, q.qIdx).correct + getProgress(q.unitId, q.qIdx).wrong) > 0).length)));
  }
  if (selectedMode === 'srs') {
    const due = pool.filter(q => isDueForReview(q.unitId, q.qIdx));
    return due.length > 0 ? due : pool.filter(q => getProgress(q.unitId, q.qIdx).nextReview === 0).slice(0, 10);
  }
  return pool;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  quizQuestions = buildQuestions();
  if (quizQuestions.length === 0) {
    showToast('出題できる問題がありません');
    return;
  }
  quizIndex = 0;
  quizResults = [];
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[quizIndex];
  const total = quizQuestions.length;

  document.getElementById('quiz-counter').textContent = `${quizIndex + 1} / ${total}`;
  document.getElementById('quiz-progress-bar').style.width = `${(quizIndex / total) * 100}%`;
  document.getElementById('quiz-unit-label').textContent = q.unitTitle;

  // Build question with blank highlighted
  const qText = q.q.replace(q.blank, `<span class="quiz-blank">${q.blank}</span>`);
  document.getElementById('quiz-question').innerHTML = qText;
  document.getElementById('quiz-hint').textContent = `「${q.blank}」を漢字で書こう`;

  // Reset answer area
  document.getElementById('answer-area').classList.remove('visible');
  document.getElementById('answer-text').textContent = q.answer;
  document.getElementById('show-btn').style.display = 'block';
  document.getElementById('judge-row').classList.remove('visible');
  answerShown = false;

  // Streak dots
  const p = getProgress(q.unitId, q.qIdx);
  for (let i = 0; i < 3; i++) {
    document.getElementById('dot' + i).classList.toggle('filled', i < (p.streak || 0));
  }
}

function showAnswer() {
  answerShown = true;
  document.getElementById('answer-area').classList.add('visible');
  document.getElementById('show-btn').style.display = 'none';
  document.getElementById('judge-row').classList.add('visible');
}

function judge(isCorrect) {
  const q = quizQuestions[quizIndex];
  updateProgress(q.unitId, q.qIdx, isCorrect);
  quizResults.push({ q, isCorrect });
  quizIndex++;
  if (quizIndex >= quizQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ==================== RESULT ====================
function showResult() {
  const total = quizResults.length;
  const correct = quizResults.filter(r => r.isCorrect).length;
  const rate = Math.round((correct / total) * 100);
  const mastered = quizResults.filter(r => isMastered(r.q.unitId, r.q.qIdx)).length;
  const missed = quizResults.filter(r => !r.isCorrect);

  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-rate').textContent = rate + '%';
  document.getElementById('stat-master').textContent = mastered;

  document.getElementById('result-icon').textContent = rate >= 80 ? '🎉' : rate >= 50 ? '😊' : '💪';
  document.getElementById('result-title').textContent = rate >= 80 ? 'すばらしい！' : rate >= 50 ? 'よくできました！' : 'がんばろう！';
  document.getElementById('result-subtitle').textContent = `${total}問中${correct}問正解（正答率 ${rate}%）`;

  const missedEl = document.getElementById('result-missed');
  if (missed.length > 0) {
    missedEl.innerHTML = `<div class="result-missed-title">⚡ 間違えた問題（${missed.length}問）</div>` +
      missed.map(r => `<div class="missed-item"><div class="missed-q">${r.q.q}</div><div class="missed-a">${r.q.answer}</div></div>`).join('');
  } else {
    missedEl.innerHTML = '<div class="result-missed-title">✨ 全問正解！</div>';
  }

  const retryBtn = document.getElementById('btn-retry-missed');
  retryBtn.style.display = missed.length > 0 ? 'block' : 'none';

  renderHome();
  showScreen('result');
}

function retryMissed() {
  const missed = quizResults.filter(r => !r.isCorrect);
  quizQuestions = missed.map(r => r.q);
  quizIndex = 0;
  quizResults = [];
  showScreen('quiz');
  renderQuestion();
}

// ==================== UTILS ====================
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showScreen('home');
  renderHome();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
