<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中1漢字ドリル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f8f7f4;
  --card:#ffffff;
  --primary:#2563eb;
  --primary-light:#dbeafe;
  --success:#16a34a;
  --success-light:#dcfce7;
  --danger:#dc2626;
  --danger-light:#fee2e2;
  --text:#1e293b;
  --text-sub:#64748b;
  --border:#e2e8f0;
  --radius:16px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:40px;
}

/* ヘッダー */
.header{
  background:var(--primary);
  color:#fff;
  padding:16px 20px 12px;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 2px 8px rgba(37,99,235,0.3);
}
.header h1{font-size:18px;font-weight:700;letter-spacing:0.05em;}
.header-sub{font-size:12px;opacity:0.8;margin-top:2px;}

/* 画面 */
.screen{display:none;padding:16px;}
.screen.active{display:block;}

/* 単元選択 */
.section-title{
  font-size:13px;font-weight:600;color:var(--text-sub);
  text-transform:uppercase;letter-spacing:0.08em;
  margin:20px 0 8px;
}
.unit-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin-bottom:16px;
}
.unit-btn{
  background:var(--card);border:2px solid var(--border);
  border-radius:12px;padding:10px 4px;
  text-align:center;cursor:pointer;
  transition:all 0.15s;
  position:relative;
}
.unit-btn.selected{
  border-color:var(--primary);background:var(--primary-light);
}
.unit-btn-num{font-size:15px;font-weight:700;color:var(--primary);}
.unit-btn-count{font-size:10px;color:var(--text-sub);margin-top:2px;}
.unit-btn-rate{
  font-size:10px;font-weight:600;
  position:absolute;top:4px;right:6px;
}

.select-all-row{display:flex;gap:8px;margin-bottom:12px;}
.btn-sm{
  flex:1;padding:8px;border:none;border-radius:10px;
  font-size:13px;font-weight:600;cursor:pointer;
}
.btn-sm.outline{
  background:var(--card);border:1.5px solid var(--border);color:var(--text);
}
.btn-sm.primary{background:var(--primary);color:#fff;}

/* モード選択 */
.mode-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.mode-btn{
  background:var(--card);border:2px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all 0.15s;
}
.mode-btn.selected{border-color:var(--primary);background:var(--primary-light);}
.mode-icon{font-size:22px;}
.mode-info{}
.mode-name{font-size:15px;font-weight:600;}
.mode-desc{font-size:12px;color:var(--text-sub);margin-top:2px;}

.start-btn{
  width:100%;padding:16px;background:var(--primary);color:#fff;
  border:none;border-radius:var(--radius);font-size:17px;font-weight:700;
  cursor:pointer;margin-top:8px;
  box-shadow:0 4px 12px rgba(37,99,235,0.3);
}
.start-btn:disabled{background:#94a3b8;box-shadow:none;}

/* 学習画面 */
.progress-bar-wrap{
  background:var(--border);border-radius:999px;height:6px;margin-bottom:4px;
}
.progress-bar-inner{
  background:var(--primary);height:100%;border-radius:999px;
  transition:width 0.3s;
}
.progress-text{font-size:12px;color:var(--text-sub);text-align:right;margin-bottom:16px;}

.card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:24px 20px;
  margin-bottom:16px;
}
.card-meta{font-size:11px;color:var(--text-sub);margin-bottom:8px;}
.card-question{
  font-size:22px;font-weight:700;line-height:1.5;
  margin-bottom:8px;letter-spacing:0.05em;
}
.card-question .blank{
  color:var(--primary);border-bottom:2px solid var(--primary);
  padding:0 4px;
}

.answer-area{
  margin-top:20px;
}
.answer-label{font-size:12px;color:var(--text-sub);margin-bottom:8px;}
.answer-box{
  background:#f1f5f9;border-radius:12px;
  padding:16px;text-align:center;
  font-size:26px;font-weight:700;letter-spacing:0.1em;
  color:var(--text);
  display:none;
}
.show-btn{
  width:100%;padding:14px;background:var(--primary-light);
  color:var(--primary);border:none;border-radius:12px;
  font-size:16px;font-weight:600;cursor:pointer;
}

.judge-row{
  display:flex;gap:10px;margin-top:12px;
  display:none;
}
.judge-btn{
  flex:1;padding:14px;border:none;border-radius:12px;
  font-size:16px;font-weight:700;cursor:pointer;
}
.judge-btn.ok{background:var(--success);color:#fff;}
.judge-btn.ng{background:var(--danger);color:#fff;}

/* マスターバッジ */
.master-badge{
  display:inline-block;background:#fbbf24;color:#fff;
  font-size:10px;font-weight:700;padding:2px 6px;
  border-radius:999px;margin-left:6px;vertical-align:middle;
}

/* 結果画面 */
.result-card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:28px 20px;
  text-align:center;margin-bottom:16px;
}
.result-icon{font-size:48px;margin-bottom:8px;}
.result-score{font-size:36px;font-weight:800;color:var(--primary);}
.result-label{font-size:14px;color:var(--text-sub);margin-top:4px;}
.result-detail{
  display:flex;justify-content:center;gap:24px;margin-top:16px;
}
.result-item{text-align:center;}
.result-item-num{font-size:22px;font-weight:700;}
.result-item-label{font-size:11px;color:var(--text-sub);}

.result-list{margin-bottom:16px;}
.result-row{
  background:var(--card);border-radius:12px;padding:12px 14px;
  margin-bottom:6px;display:flex;align-items:center;gap:10px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.result-row.correct{border-left:4px solid var(--success);}
.result-row.wrong{border-left:4px solid var(--danger);}
.result-row-q{flex:1;font-size:13px;}
.result-row-a{font-size:14px;font-weight:700;}
.result-row-mark{font-size:18px;}

.action-row{display:flex;gap:8px;}
.action-btn{
  flex:1;padding:14px;border:none;border-radius:var(--radius);
  font-size:15px;font-weight:700;cursor:pointer;
}
.action-btn.primary{background:var(--primary);color:#fff;}
.action-btn.outline{background:var(--card);border:2px solid var(--border);color:var(--text);}

/* 統計画面 */
.stats-card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:8px;
}
.stats-row{display:flex;justify-content:space-between;align-items:center;}
.stats-unit{font-size:14px;font-weight:600;}
.stats-nums{font-size:12px;color:var(--text-sub);}
.mini-bar-wrap{background:var(--border);border-radius:999px;height:4px;margin-top:6px;}
.mini-bar-inner{background:var(--primary);height:100%;border-radius:999px;}

/* ボトムナビ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--border);
  display:flex;z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;padding:10px 0 8px;border:none;background:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;color:var(--text-sub);font-size:10px;
}
.nav-btn.active{color:var(--primary);}
.nav-icon{font-size:22px;}

.pb-nav{padding-bottom:80px;}

/* SRSバッジ */
.srs-badge{
  background:var(--danger);color:#fff;
  font-size:11px;font-weight:700;padding:2px 8px;
  border-radius:999px;display:inline-block;margin-left:8px;
}
</style>
</head>
<body>

<div class="header">
  <h1>中１漢字ドリル</h1>
  <div class="header-sub" id="headerSub">単元を選んで学習しよう</div>
</div>

<!-- 学習画面 -->
<div id="screenStudy" class="screen pb-nav">
  <div class="progress-bar-wrap"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>

  <div class="card">
    <div class="card-meta" id="cardMeta"></div>
    <div class="card-question" id="cardQuestion"></div>
    <div class="answer-area">
      <div class="answer-label">答え</div>
      <div class="answer-box" id="answerBox"></div>
      <button class="show-btn" id="showBtn" onclick="showAnswer()">答えを見る</button>
      <div class="judge-row" id="judgeRow">
        <button class="judge-btn ng" onclick="judge(false)">もう一回 ✗</button>
        <button class="judge-btn ok" onclick="judge(true)">できた ✓</button>
      </div>
    </div>
  </div>
</div>

<!-- 結果画面 -->
<div id="screenResult" class="screen pb-nav">
  <div class="result-card">
    <div class="result-icon" id="resultIcon">🎉</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-label">正答率</div>
    <div class="result-detail">
      <div class="result-item">
        <div class="result-item-num" id="resultCorrect"></div>
        <div class="result-item-label">正解</div>
      </div>
      <div class="result-item">
        <div class="result-item-num" id="resultWrong"></div>
        <div class="result-item-label">不正解</div>
      </div>
      <div class="result-item">
        <div class="result-item-num" id="resultTotal"></div>
        <div class="result-item-label">合計</div>
      </div>
    </div>
  </div>
  <div class="result-list" id="resultList"></div>
  <div class="action-row">
    <button class="action-btn outline" onclick="retryWrong()">間違いだけ復習</button>
    <button class="action-btn primary" onclick="goHome()">ホームへ</button>
  </div>
</div>

<!-- ホーム画面 -->
<div id="screenHome" class="screen active pb-nav">
  <div class="section-title">単元を選ぶ</div>
  <div class="select-all-row">
    <button class="btn-sm outline" onclick="selectAll(false)">すべて解除</button>
    <button class="btn-sm primary" onclick="selectAll(true)">すべて選択</button>
  </div>
  <div class="unit-grid" id="unitGrid"></div>

  <div class="section-title">出題モード</div>
  <div class="mode-list">
    <div class="mode-btn selected" onclick="selectMode(this,'all')" data-mode="all">
      <div class="mode-icon">📚</div>
      <div class="mode-info">
        <div class="mode-name">全問</div>
        <div class="mode-desc">選択した単元の問題をすべて出題</div>
      </div>
    </div>
    <div class="mode-btn" onclick="selectMode(this,'random10')" data-mode="random10">
      <div class="mode-icon">🎲</div>
      <div class="mode-info">
        <div class="mode-name">10問ランダム</div>
        <div class="mode-desc">ランダムに10問を出題</div>
      </div>
    </div>
    <div class="mode-btn" onclick="selectMode(this,'weak5')" data-mode="weak5">
      <div class="mode-icon">💪</div>
      <div class="mode-info">
        <div class="mode-name">苦手5問</div>
        <div class="mode-desc">正答率の低い問題を優先出題</div>
      </div>
    </div>
    <div class="mode-btn" onclick="selectMode(this,'srs')" data-mode="srs">
      <div class="mode-icon">🔄</div>
      <div class="mode-info">
        <div class="mode-name">今日の復習 <span class="srs-badge" id="srsBadge">0</span></div>
        <div class="mode-desc">SRS：今日復習すべき問題</div>
      </div>
    </div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startStudy()">学習スタート</button>
</div>

<!-- 統計画面 -->
<div id="screenStats" class="screen pb-nav">
  <div class="section-title">単元別の進捗</div>
  <div id="statsContent"></div>
</div>

<!-- ボトムナビ -->
<div class="bottom-nav">
  <button class="nav-btn active" id="navHome" onclick="showScreen('home')">
    <span class="nav-icon">🏠</span>ホーム
  </button>
  <button class="nav-btn" id="navStats" onclick="showScreen('stats')">
    <span class="nav-icon">📊</span>統計
  </button>
</div>

// ===== ストレージ =====
const STORAGE_KEY = 'kanji_v1';
let store = {};
function loadStore(){
  try{ store = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); }
  catch(e){ store = {}; }
}
function saveStore(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
}
function getQKey(uid, qi){ return `${uid}_${qi}`; }
function getRecord(uid, qi){
  const k = getQKey(uid,qi);
  if(!store[k]) store[k]={correct:0,wrong:0,streak:0,nextReview:0,mastered:false};
  return store[k];
}

// ===== SRS =====
const SRS_INTERVALS = [1,3,7,14,30]; // days
function updateSRS(uid, qi, correct){
  const r = getRecord(uid,qi);
  if(correct){
    r.correct++;
    r.streak = (r.streak||0)+1;
    if(r.streak>=3) r.mastered=true;
    const lvl = Math.min(r.correct, SRS_INTERVALS.length-1);
    r.nextReview = Date.now() + SRS_INTERVALS[lvl]*86400000;
  } else {
    r.wrong++;
    r.streak=0;
    r.mastered=false;
    r.nextReview = Date.now() + 86400000;
  }
  saveStore();
}
function getSRSQuestions(){
  const now = Date.now();
  const result = [];
  UNITS.forEach(u=>{
    u.questions.forEach((q,i)=>{
      const r = getRecord(u.id,i);
      if(!r.mastered && r.nextReview>0 && r.nextReview<=now){
        result.push({uid:u.id,qi:i,q,unitTitle:u.title});
      }
    });
  });
  return result;
}

// ===== 状態 =====
let selectedUnits = new Set();
let currentMode = 'all';
let queue = [];
let currentIdx = 0;
let sessionResults = [];
let answerShown = false;

loadStore();

// ===== 初期化 =====
function init(){
  renderUnitGrid();
  updateSRSBadge();
  updateStartBtn();
}

function renderUnitGrid(){
  const grid = document.getElementById('unitGrid');
  grid.innerHTML = '';
  UNITS.forEach(u=>{
    const total = u.questions.length;
    let correct=0, mastered=0;
    u.questions.forEach((_,i)=>{
      const r=getRecord(u.id,i);
      if(r.correct>0) correct++;
      if(r.mastered) mastered++;
    });
    const rate = total>0 ? Math.round(correct/total*100) : 0;
    const sel = selectedUnits.has(u.id);
    const color = rate>=80?'#16a34a':rate>=50?'#d97706':'#64748b';
    const div = document.createElement('div');
    div.className = 'unit-btn' + (sel?' selected':'');
    div.innerHTML = `
      <div class="unit-btn-rate" style="color:${color}">${rate>0?rate+'%':''}</div>
      <div class="unit-btn-num">${u.title}</div>
      <div class="unit-btn-count">${total}問${mastered>0?` ⭐${mastered}`:''}</div>
    `;
    div.onclick = ()=>toggleUnit(u.id, div);
    grid.appendChild(div);
  });
}

function toggleUnit(id, el){
  if(selectedUnits.has(id)){
    selectedUnits.delete(id);
    el.classList.remove('selected');
  } else {
    selectedUnits.add(id);
    el.classList.add('selected');
  }
  updateStartBtn();
}

function selectAll(v){
  if(v){ UNITS.forEach(u=>selectedUnits.add(u.id)); }
  else { selectedUnits.clear(); }
  renderUnitGrid();
  updateStartBtn();
}

function selectMode(el, mode){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  currentMode = mode;
  updateStartBtn();
}

function updateStartBtn(){
  const btn = document.getElementById('startBtn');
  if(currentMode==='srs'){
    const cnt = getSRSQuestions().length;
    btn.disabled = cnt===0;
    btn.textContent = cnt>0?`復習スタート（${cnt}問）`:'復習する問題がありません';
  } else {
    btn.disabled = selectedUnits.size===0;
    btn.textContent = '学習スタート';
  }
}

function updateSRSBadge(){
  const cnt = getSRSQuestions().length;
  document.getElementById('srsBadge').textContent = cnt;
}

// ===== 学習開始 =====
function startStudy(){
  queue = [];
  if(currentMode==='srs'){
    const srsQ = getSRSQuestions();
    queue = srsQ.map(item=>({uid:item.uid,qi:item.qi,q:item.q,unitTitle:item.unitTitle}));
  } else {
    const pool = [];
    UNITS.filter(u=>selectedUnits.has(u.id)).forEach(u=>{
      u.questions.forEach((q,i)=>pool.push({uid:u.id,qi:i,q,unitTitle:u.title}));
    });
    if(currentMode==='random10'){
      shuffle(pool); queue = pool.slice(0,10);
    } else if(currentMode==='weak5'){
      pool.sort((a,b)=>{
        const ra=getRecord(a.uid,a.qi), rb=getRecord(b.uid,b.qi);
        const sa=ra.correct/(ra.correct+ra.wrong+0.001);
        const sb=rb.correct/(rb.correct+rb.wrong+0.001);
        return sa-sb;
      });
      queue = pool.slice(0,5);
    } else {
      shuffle(pool); queue = pool;
    }
  }
  if(queue.length===0){ alert('問題がありません'); return; }
  currentIdx=0; sessionResults=[];
  showScreen('study');
  renderQuestion();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function renderQuestion(){
  const item = queue[currentIdx];
  const {unitTitle, uid, qi} = item;
  const r = getRecord(uid,qi);
  const total = queue.length;

  document.getElementById('progressBar').style.width = (currentIdx/total*100)+'%';
  document.getElementById('progressText').textContent = `${currentIdx+1} / ${total}`;
  document.getElementById('headerSub').textContent = unitTitle;

  const qObj = item.q;
  const qText = qObj.q;
  const blankText = qObj.b;
  let displayQ = qText;
  if(blankText && qText.includes(blankText)){
    displayQ = qText.replace(blankText, `<span class="blank">${blankText}</span>`);
  }

  const mastBadge = r.mastered ? '<span class="master-badge">⭐マスター</span>' : '';
  document.getElementById('cardMeta').innerHTML = `${unitTitle}　正解率: ${r.correct+r.wrong>0?Math.round(r.correct/(r.correct+r.wrong)*100)+'%':'未挑戦'}${mastBadge}`;
  document.getElementById('cardQuestion').innerHTML = displayQ;
  document.getElementById('answerBox').textContent = qObj.a;
  document.getElementById('answerBox').style.display='none';
  document.getElementById('showBtn').style.display='block';
  document.getElementById('judgeRow').style.display='none';
  answerShown=false;
}

function showAnswer(){
  const item = queue[currentIdx];
  const ans = item.q.a;
  document.getElementById('answerBox').textContent = ans;
  document.getElementById('answerBox').style.display='block';
  document.getElementById('showBtn').style.display='none';
  document.getElementById('judgeRow').style.display='flex';
  answerShown=true;
}

function judge(correct){
  const item = queue[currentIdx];
  const uid = item.uid, qi = item.qi;
  const ans = item.q.a;
  const qtext = typeof item.q==='object'?item.q.q:item.q;
  updateSRS(uid, qi, correct);
  sessionResults.push({q:qtext, a:ans, correct, unitTitle:item.unitTitle});
  currentIdx++;
  if(currentIdx>=queue.length){
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult(){
  const correct = sessionResults.filter(r=>r.correct).length;
  const wrong = sessionResults.length - correct;
  const rate = Math.round(correct/sessionResults.length*100);

  document.getElementById('resultIcon').textContent = rate>=80?'🎉':rate>=50?'💪':'😢';
  document.getElementById('resultScore').textContent = rate+'%';
  document.getElementById('resultCorrect').textContent = correct;
  document.getElementById('resultWrong').textContent = wrong;
  document.getElementById('resultTotal').textContent = sessionResults.length;

  const list = document.getElementById('resultList');
  list.innerHTML = '';
  sessionResults.forEach(r=>{
    const div = document.createElement('div');
    div.className = 'result-row '+(r.correct?'correct':'wrong');
    div.innerHTML = `
      <div class="result-row-mark">${r.correct?'✓':'✗'}</div>
      <div class="result-row-q">${r.q}</div>
      <div class="result-row-a">${r.a}</div>
    `;
    list.appendChild(div);
  });

  showScreen('result');
  updateSRSBadge();
  renderUnitGrid();
}

function retryWrong(){
  const wrongItems = sessionResults.filter(r=>!r.correct);
  if(wrongItems.length===0){ alert('間違いはありません！'); return; }
  // 間違いを再キュー
  queue = queue.filter(item=>{
    const qtext = typeof item.q==='object'?item.q.q:item.q;
    return wrongItems.some(w=>w.q===qtext);
  });
  currentIdx=0; sessionResults=[];
  showScreen('study');
  renderQuestion();
}

function goHome(){
  showScreen('home');
}

// ===== 統計 =====
function renderStats(){
  const cont = document.getElementById('statsContent');
  cont.innerHTML = '';
  UNITS.forEach(u=>{
    let correct=0,wrong=0,mastered=0;
    u.questions.forEach((_,i)=>{
      const r=getRecord(u.id,i);
      correct+=r.correct; wrong+=r.wrong;
      if(r.mastered) mastered++;
    });
    const total=u.questions.length;
    const rate=correct+wrong>0?Math.round(correct/(correct+wrong)*100):0;
    const mastRate=Math.round(mastered/total*100);
    const div=document.createElement('div');
    div.className='stats-card';
    div.innerHTML=`
      <div class="stats-row">
        <div class="stats-unit">${u.title}</div>
        <div class="stats-nums">正解${correct} / 挑戦${correct+wrong}　⭐${mastered}/${total}</div>
      </div>
      <div class="mini-bar-wrap"><div class="mini-bar-inner" style="width:${mastRate}%"></div></div>
    `;
    cont.appendChild(div);
  });
}

// ===== 画面切替 =====
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(name==='home'){
    document.getElementById('screenHome').classList.add('active');
    document.getElementById('navHome').classList.add('active');
    document.getElementById('headerSub').textContent='単元を選んで学習しよう';
  } else if(name==='study'){
    document.getElementById('screenStudy').classList.add('active');
  } else if(name==='result'){
    document.getElementById('screenResult').classList.add('active');
  } else if(name==='stats'){
    document.getElementById('screenStats').classList.add('active');
    document.getElementById('navStats').classList.add('active');
    document.getElementById('headerSub').textContent='学習統計';
    renderStats();
  }
}

init();
</script>
